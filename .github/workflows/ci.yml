name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Generate types from Zod schemas
        run: npm run gen:types

      - name: Lint banned patterns
        run: |
          # new Date is banned in production code — use lib/datetime.ts instead
          if grep -rn 'new Date' --include='*.ts' src/ tools/ lib/ scripts/ | grep -v '\.test\.ts'; then
            echo "::error::Found 'new Date' in production code. Use dayjs from lib/datetime.ts instead."
            exit 1
          fi

      - name: Lint (Oxlint)
        run: npx oxlint src/ tools/ lib/

      - name: Format check (Biome)
        run: npx biome check --no-errors-on-unmatched src/ tools/ lib/

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Coverage threshold check
        run: npm run test:coverage
