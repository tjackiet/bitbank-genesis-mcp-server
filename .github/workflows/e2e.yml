name: E2E

# E2E は実サブプロセス + tsx + StdioClientTransport を必要とするため
# サンドボックスや GH Actions の一時的な network/process 制約で flaky になりやすい。
# PR ごとには走らせず、手動実行 + 週次スケジュールで回す。
on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 18 * * 0' # 毎週日曜 18:00 UTC (= 月曜 03:00 JST)

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Generate types from Zod schemas
        run: npm run gen:types

      - name: E2E (stdio subprocess)
        run: npm run test:e2e
