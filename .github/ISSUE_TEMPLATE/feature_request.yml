name: 機能要望
description: 新機能や改善の提案
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能要望ありがとうございます。

  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: どんな場面で困っていますか？
      placeholder: 例）複数銘柄を一括でスクリーニングしたいが、1つずつ呼び出す必要がある
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのような機能があると嬉しいですか？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案（任意）
      description: 他に検討した方法があれば教えてください。
